<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flazz</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      html.dark,
      html.dark body {
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 45%),
          linear-gradient(180deg, #101010 0%, #171717 45%, #0e0e0e 100%);
      }

      html.light,
      html.light body {
        background:
          radial-gradient(circle at top, rgba(16, 16, 16, 0.05), transparent 42%),
          linear-gradient(180deg, #fafafa 0%, #f3f3f3 42%, #ececec 100%);
      }

      body {
        position: relative;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      #app-preload {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        pointer-events: none;
        transition:
          opacity 420ms ease,
          visibility 420ms ease,
          transform 420ms ease;
      }

      #app-preload::before,
      #app-preload::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        filter: blur(42px);
        opacity: 0.6;
        animation: preload-orb-float 7s ease-in-out infinite;
      }

      #app-preload::before {
        width: 18rem;
        height: 18rem;
        top: 14%;
        left: calc(50% - 16rem);
      }

      #app-preload::after {
        width: 16rem;
        height: 16rem;
        right: calc(50% - 17rem);
        bottom: 14%;
        animation-delay: -3.4s;
      }

      html.dark #app-preload::before,
      html.dark #app-preload::after {
        background: rgba(255, 255, 255, 0.08);
      }

      html.light #app-preload::before,
      html.light #app-preload::after {
        background: rgba(17, 17, 17, 0.07);
      }

      .preload-shell {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        min-width: 17rem;
        padding: 2rem 2.25rem;
        border-radius: 1.75rem;
        backdrop-filter: blur(16px);
        animation: preload-shell-enter 540ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      html.dark .preload-shell {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          0 26px 80px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      html.light .preload-shell {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.72));
        border: 1px solid rgba(17, 17, 17, 0.08);
        box-shadow:
          0 24px 72px rgba(17, 17, 17, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.85);
      }

      .preload-logo-wrap {
        position: relative;
        display: grid;
        place-items: center;
        width: 5.75rem;
        height: 5.75rem;
      }

      .preload-logo-wrap::before {
        content: "";
        position: absolute;
        inset: 0.35rem;
        border-radius: 1.6rem;
        transform: scale(0.92);
        animation: preload-halo-pulse 2.8s ease-in-out infinite;
      }

      html.dark .preload-logo-wrap::before {
        background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 68%);
      }

      html.light .preload-logo-wrap::before {
        background: radial-gradient(circle, rgba(17, 17, 17, 0.12), transparent 68%);
      }

      .preload-logo {
        position: absolute;
        width: 4.15rem;
        height: 4.15rem;
        object-fit: contain;
        transform-origin: center;
        animation: preload-logo-breathe 2.8s ease-in-out infinite;
      }

      .preload-logo--light {
        opacity: 0;
      }

      .preload-logo--dark {
        opacity: 1;
      }

      html.dark .preload-logo--light {
        opacity: 1;
      }

      html.dark .preload-logo--dark {
        opacity: 0;
      }

      .preload-copy {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.45rem;
        text-align: center;
      }

      .preload-title {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .preload-subtitle {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      html.dark .preload-title {
        color: rgba(255, 255, 255, 0.94);
      }

      html.dark .preload-subtitle {
        color: rgba(255, 255, 255, 0.56);
      }

      html.light .preload-title {
        color: rgba(17, 17, 17, 0.92);
      }

      html.light .preload-subtitle {
        color: rgba(17, 17, 17, 0.54);
      }

      .preload-progress {
        position: relative;
        width: min(15rem, 52vw);
        height: 0.32rem;
        overflow: hidden;
        border-radius: 999px;
      }

      html.dark .preload-progress {
        background: rgba(255, 255, 255, 0.1);
      }

      html.light .preload-progress {
        background: rgba(17, 17, 17, 0.08);
      }

      .preload-progress::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 44%;
        border-radius: inherit;
        animation: preload-progress-slide 1.3s ease-in-out infinite;
      }

      html.dark .preload-progress::after {
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.2));
      }

      html.light .preload-progress::after {
        background: linear-gradient(90deg, rgba(17, 17, 17, 0.15), rgba(17, 17, 17, 0.82), rgba(17, 17, 17, 0.15));
      }

      body.app-ready #app-preload {
        opacity: 0;
        visibility: hidden;
        transform: scale(1.02);
      }

      @keyframes preload-shell-enter {
        from {
          opacity: 0;
          transform: translateY(18px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes preload-halo-pulse {
        0%,
        100% {
          opacity: 0.58;
          transform: scale(0.9);
        }
        50% {
          opacity: 1;
          transform: scale(1.04);
        }
      }

      @keyframes preload-logo-breathe {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-3px) scale(1.025);
        }
      }

      @keyframes preload-progress-slide {
        0% {
          transform: translateX(-115%);
        }
        100% {
          transform: translateX(250%);
        }
      }

      @keyframes preload-orb-float {
        0%,
        100% {
          transform: translate3d(0, 0, 0) scale(1);
        }
        50% {
          transform: translate3d(0, -14px, 0) scale(1.06);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-preload,
        #app-preload::before,
        #app-preload::after,
        .preload-shell,
        .preload-logo,
        .preload-logo-wrap::before,
        .preload-progress::after {
          animation: none !important;
          transition: opacity 220ms ease, visibility 220ms ease;
        }
      }
    </style>
    <script>
      // Apply theme class immediately before render
      (function() {
        var stored = localStorage.getItem('Flazz-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored || 'system';
        var resolved = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
        document.documentElement.classList.add(resolved);
      })();
    </script>
  </head>
  <body>
    <div id="app-preload" aria-hidden="true">
      <div class="preload-shell">
        <div class="preload-logo-wrap">
          <img class="preload-logo preload-logo--light" src="/logo-white.png" alt="" />
          <img class="preload-logo preload-logo--dark" src="/logo-black.png" alt="" />
        </div>
        <div class="preload-copy">
          <p class="preload-title">Flazz</p>
          <p class="preload-subtitle">Loading your local workspace and copilots</p>
        </div>
        <div class="preload-progress"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

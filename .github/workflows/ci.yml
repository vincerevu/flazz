name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Run typecheck
        run: pnpm run typecheck

  package-smoke:
    needs: quality-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            package_command: pnpm run make:windows
            artifact_name: flazz-package-windows
            artifact_paths: |
              release/FlazzSetup-*.exe
              release/Flazz-win32-*.zip
              release/latest.yml
              release/*.blockmap
          - os: macos-latest
            package_command: pnpm run make:desktop
            artifact_name: flazz-package-macos
            artifact_paths: |
              release/Flazz-darwin-*.dmg
              release/Flazz-darwin-*.zip
              release/latest-mac.yml
              release/*.blockmap
          - os: ubuntu-latest
            package_command: pnpm run make:desktop
            artifact_name: flazz-package-linux
            artifact_paths: |
              release/Flazz-linux-*.deb
              release/Flazz-linux-*.rpm
              release/Flazz-linux-*.zip
              release/latest-linux.yml
              release/*.blockmap
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync app version for CI packaging
        run: node apps/main/scripts/sync-version.cjs
        env:
          RELEASE_VERSION: 0.0.0-ci

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot

      - name: Package app
        run: cd apps/main && ${{ matrix.package_command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: List output files (Windows)
        if: always() && runner.os == 'Windows'
        run: |
          echo "Contents of release:"
          Get-ChildItem -Path release -Recurse

      - name: Verify packaged artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          $patterns = @(
            "release/FlazzSetup-*.exe",
            "release/Flazz-win32-*.zip",
            "release/latest.yml"
          )
          foreach ($pattern in $patterns) {
            $matches = Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue
            if (-not $matches) {
              Write-Error "Missing packaged artifact matching pattern: $pattern"
            }
          }

      - name: List output files (Unix)
        if: always() && runner.os != 'Windows'
        run: |
          echo "Contents of release:"
          ls -R release

      - name: Verify packaged artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          case "${{ runner.os }}" in
            macOS)
              patterns=(
                "release/Flazz-darwin-*.dmg"
                "release/Flazz-darwin-*.zip"
                "release/latest-mac.yml"
              )
              ;;
            Linux)
              patterns=(
                "release/Flazz-linux-*.deb"
                "release/Flazz-linux-*.rpm"
                "release/Flazz-linux-*.zip"
                "release/latest-linux.yml"
              )
              ;;
          esac

          for pattern in "${patterns[@]}"; do
            if ! compgen -G "$pattern" > /dev/null; then
              echo "Missing packaged artifact matching pattern: $pattern" >&2
              exit 1
            fi
          done

      - name: Upload packaging artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: warn
          retention-days: 7

name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync app version to release tag
        run: node apps/main/scripts/sync-version.cjs
        env:
          RELEASE_VERSION: ${{ github.ref_name }}

      - name: Package Windows app
        run: cd apps/main && pnpm run make:windows

      - name: List output files
        run: |
          echo "Contents of release:"
          Get-ChildItem -Path release -Recurse

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flazz-windows
          path: |
            release/FlazzSetup.exe
            release/Flazz-win32-x64.zip
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync app version to release tag
        run: node apps/main/scripts/sync-version.cjs
        env:
          RELEASE_VERSION: ${{ github.ref_name }}

      - name: Package macOS app
        run: cd apps/main && pnpm run make:desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: List output files
        run: |
          echo "Contents of release:"
          ls -R release

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flazz-macos
          path: |
            release/Flazz-darwin-arm64.dmg
            release/Flazz-darwin-arm64.zip
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync app version to release tag
        run: node apps/main/scripts/sync-version.cjs
        env:
          RELEASE_VERSION: ${{ github.ref_name }}

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot

      - name: Package Linux app
        run: cd apps/main && pnpm run make:desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output files
        run: |
          echo "Contents of release:"
          ls -R release

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flazz-linux
          path: |
            release/Flazz-linux-x64.deb
            release/Flazz-linux-x64.rpm
            release/Flazz-linux-x64.zip
          retention-days: 7

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: flazz-windows
          path: dist-windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: flazz-macos
          path: dist-macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: flazz-linux
          path: dist-linux

      - name: Display structure of downloaded files
        run: |
          echo "Windows files:"
          ls -R dist-windows
          echo "macOS files:"
          ls -R dist-macos
          echo "Linux files:"
          ls -R dist-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-windows/**/*
            dist-macos/**/*
            dist-linux/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
          body: |
            ## Downloads

            ### Windows
            - `FlazzSetup.exe` - Windows installer
            - `Flazz-win32-x64.zip` - Windows portable build

            ### macOS
            - `*.dmg` - macOS installer
            - `*.zip` - macOS portable build

            ### Linux
            - `*.deb` - Debian/Ubuntu package
            - `*.rpm` - Fedora/RHEL package
            - `*.zip` - portable build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
